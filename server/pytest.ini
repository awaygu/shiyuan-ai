[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --cov=.
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=50
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
